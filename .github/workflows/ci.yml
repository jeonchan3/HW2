name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # main 브랜치에 코드가 push될 때 작동합니다.

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 저장소의 코드를 체크아웃합니다.
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 다중 아키텍처 지원 및 캐싱을 위해 Docker Buildx를 설정합니다.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. GitHub Secrets를 이용하여 Docker Hub에 로그인합니다.
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Docker 이미지를 빌드하고 Docker Hub로 푸시합니다.
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Docker Hub의 레포지토리 이름을 username/mlops-recycle-api 로 지정합니다.
          tags: ${{ secrets.DOCKER_USERNAME }}/mlops-recycle-api:latest
          
          # 캐시를 이용해 빌드 속도 개선
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/mlops-recycle-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/mlops-recycle-api:buildcache,mode=max
