name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # main 브랜치에 코드가 push될 때 작동합니다.

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 저장소의 코드를 체크아웃합니다.
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 다중 아키텍처 지원 및 캐싱을 위해 Docker Buildx를 설정합니다.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. GitHub Secrets를 이용하여 Docker Hub에 로그인합니다.
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Docker 이미지를 빌드하고 Docker Hub로 푸시합니다.
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Docker Hub의 레포지토리 이름을 username/mlops-recycle-api 로 지정합니다.
          tags: ${{ secrets.DOCKER_USERNAME }}/mlops-recycle-api:latest
          
          # 캐시를 이용해 빌드 속도 개선
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/mlops-recycle-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/mlops-recycle-api:buildcache,mode=max

  deploy:
    name: Deploy to Local Self-hosted Runner
    needs: build-and-push  # 빌드와 푸시가 성공적으로 끝나야만 실행됩니다.
    runs-on: self-hosted   # 사용자 컴퓨터에 설정한 런너에서 동작합니다.

    steps:
      # 1. 윈도우 런너의 특이한 파워쉘 문자 변환 버그로 인해 로그인이 지속 실패하므로, 아예 이 단계를 건너뜁니다! (Public 저장소이거나 이미 로컬에 로그인되어 있어 다운로드 가능)

      # 2. 방금 푸시된 최신 이미지를 Pull(다운로드) 합니다.
      - name: Pull the latest Docker image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/mlops-recycle-api:latest
        shell: cmd

      # 3. 기존에 실행되고 있던 `mlops-api` 컨테이너를 중지하고 삭제합니다. (에러가 나도 진행되도록 설정)
      - name: Stop and remove existing container
        run: |
          docker stop mlops-api
          docker rm mlops-api
        continue-on-error: true
        shell: cmd

      # 4. 방금 받은 최신 이미지로 컨테이너를 새롭게 띄웁니다.
      - name: Run new container
        run: docker run -d -p 8000:8000 --name mlops-api ${{ secrets.DOCKER_USERNAME }}/mlops-recycle-api:latest
        shell: cmd
